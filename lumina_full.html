<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina - NGL Spammer (Cepat)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 52px;
            font-weight: 800;
            background: linear-gradient(135deg, #e8e8e8, #ffffff, #a8a8a8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header p {
            color: #6a6a7a;
            font-size: 13px;
            margin-top: 6px;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .nav-btn {
            flex: 1;
            text-align: center;
            padding: 14px 0;
            background: #1e1e28;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            color: #888;
            border: 1px solid #2a2a35;
        }

        .nav-btn.active {
            background: #2a2a38;
            color: white;
            border-color: #5a5a7a;
            box-shadow: 0 0 12px rgba(255,255,255,0.05);
        }

        .card {
            background: #14141c;
            border-radius: 28px;
            padding: 24px;
            border: 1px solid #2a2a35;
        }

        .input-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #aaa;
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            background: #0d0d12;
            border: 1px solid #2a2a35;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .input-field:focus {
            outline: none;
            border-color: #5a5a7a;
        }

        textarea.input-field {
            resize: vertical;
            font-family: 'Inter', sans-serif;
        }

        .btn-kirim {
            width: 100%;
            padding: 16px;
            background: #2a2a38;
            border: 1px solid #4a4a5a;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-kirim:hover {
            background: #3a3a4a;
        }

        .btn-kirim:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-batal {
            width: 100%;
            padding: 12px;
            background: #2a1a1a;
            border: 1px solid #6a3a3a;
            border-radius: 30px;
            color: #ff9a9a;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }

        .progress-wrapper {
            margin-top: 16px;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 8px;
        }

        .progress-bar {
            background: #2a2a30;
            border-radius: 20px;
            height: 6px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #ccc, #fff);
            width: 0%;
            height: 100%;
            border-radius: 20px;
            transition: width 0.2s;
        }

        .history-item {
            background: #101018;
            border-radius: 18px;
            padding: 14px;
            margin-bottom: 10px;
            border-left: 3px solid;
        }

        .history-user {
            font-weight: 700;
            color: white;
            display: inline-block;
            margin-right: 10px;
        }

        .badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            display: inline-block;
        }

        .badge-succ {
            background: #1a4a2a;
            color: #8bffaa;
        }

        .badge-fail {
            background: #5a2a2a;
            color: #ffaaaa;
        }

        .history-msg {
            font-size: 13px;
            color: #bbb;
            margin: 8px 0 6px;
        }

        .history-time {
            font-size: 10px;
            color: #666;
        }

        .hidden {
            display: none;
        }

        .text-center {
            text-align: center;
        }

        .text-gray {
            color: #777;
        }

        .mb-3 {
            margin-bottom: 12px;
        }

        .flex {
            display: flex;
        }

        .justify-between {
            justify-content: space-between;
        }

        .max-h-96 {
            max-height: 420px;
            overflow-y: auto;
        }

        .py-10 {
            padding: 40px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>LUMINA</h1>
            <p>NGL Spammer | Mode Cepat ⚡</p>
        </div>

        <div class="nav-buttons">
            <div class="nav-btn active" id="btnHome"><i class="fas fa-home"></i> Home</div>
            <div class="nav-btn" id="btnSpam"><i class="fas fa-bolt"></i> Spam NGL</div>
        </div>

        <div id="panelHome">
            <div class="card">
                <div class="flex justify-between mb-3">
                    <span><i class="fas fa-history"></i> Riwayat</span>
                    <button id="hapusHistory" style="background:none; border:none; color:#777; cursor:pointer;"><i class="fas fa-trash"></i></button>
                </div>
                <div id="historyContainer" class="max-h-96">
                    <div class="text-center text-gray py-10"><i class="fas fa-inbox"></i> Belum ada kiriman</div>
                </div>
            </div>
        </div>

        <div id="panelSpam" class="hidden">
            <div class="card">
                <div class="input-label"><i class="fas fa-user"></i> 1. Nama NGL</div>
                <input type="text" id="username" class="input-field" placeholder="contoh: johndoe">

                <div class="input-label"><i class="fas fa-comment"></i> 2. Pesan</div>
                <textarea id="message" class="input-field" rows="3" placeholder="Tulis pesan... (bebas panjang)"></textarea>

                <div class="input-label"><i class="fas fa-hashtag"></i> 3. Jumlah (max 25)</div>
                <input type="number" id="count" class="input-field" min="1" max="25" value="5">

                <div id="progressBox" class="hidden">
                    <div class="progress-text">
                        <span><i class="fas fa-spinner fa-pulse"></i> Mengirim...</span>
                        <span id="percentText">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                    <button id="btnCancel" class="btn-batal"><i class="fas fa-ban"></i> Batalkan</button>
                </div>

                <button id="btnSend" class="btn-kirim"><i class="fas fa-paper-plane"></i> Kirim Sekarang</button>
            </div>
        </div>
    </div>

    <script>
        let historyData = [];
        
        try {
            let saved = localStorage.getItem('lumina_history');
            if (saved) historyData = JSON.parse(saved);
        } catch(e) {}

        let cancelToken = null;

        function toast(msg, isErr) {
            let t = document.createElement('div');
            t.style.position = 'fixed';
            t.style.bottom = '20px';
            t.style.left = '20px';
            t.style.right = '20px';
            t.style.maxWidth = '400px';
            t.style.margin = 'auto';
            t.style.background = isErr ? '#3a1a1a' : '#1a3a2a';
            t.style.color = 'white';
            t.style.padding = '12px 18px';
            t.style.borderRadius = '20px';
            t.style.fontSize = '14px';
            t.style.fontWeight = '500';
            t.style.textAlign = 'center';
            t.style.zIndex = '9999';
            t.style.border = isErr ? '1px solid #ff6a6a' : '1px solid #6aff9a';
            t.innerHTML = '<i class="fas ' + (isErr ? 'fa-exclamation-triangle' : 'fa-check-circle') + '"></i> ' + msg;
            document.body.appendChild(t);
            setTimeout(function() { t.remove(); }, 2500);
        }

        function simpanHistory() {
            localStorage.setItem('lumina_history', JSON.stringify(historyData));
            renderHistory();
        }

        function tambahHistory(username, message, count, status, err) {
            historyData.unshift({
                id: Date.now(),
                username: username,
                message: message.substring(0, 60),
                count: count,
                status: status,
                error: err,
                time: new Date().toLocaleString('id-ID')
            });
            if (historyData.length > 50) historyData.pop();
            simpanHistory();
            if (status === 'success') {
                toast(count + ' pesan berhasil ke @' + username, false);
            } else {
                toast('Gagal: ' + (err || 'unknown'), true);
            }
        }

        function renderHistory() {
            let wadah = document.getElementById('historyContainer');
            if (!wadah) return;
            if (historyData.length === 0) {
                wadah.innerHTML = '<div class="text-center text-gray py-10"><i class="fas fa-inbox"></i> Belum ada kiriman</div>';
                return;
            }
            let html = '';
            for (let i = 0; i < historyData.length; i++) {
                let h = historyData[i];
                let cls = h.status === 'success' ? 'badge-succ' : 'badge-fail';
                let icon = h.status === 'success' ? 'fa-check' : 'fa-times';
                let txt = h.status === 'success' ? 'Berhasil' : 'Gagal';
                html += '<div class="history-item" style="border-left-color: ' + (h.status === 'success' ? '#5aaf7a' : '#ff7a7a') + '">';
                html += '<div><span class="history-user"><i class="fas fa-at"></i> ' + escapeHtml(h.username) + '</span>';
                html += '<span class="badge ' + cls + '"><i class="fas ' + icon + '"></i> ' + txt + '</span>';
                html += '<span style="font-size:10px; color:#666; margin-left:8px;"><i class="fas fa-envelope"></i> ' + h.count + '</span></div>';
                html += '<div class="history-msg">"' + escapeHtml(h.message) + '"</div>';
                html += '<div class="history-time"><i class="far fa-clock"></i> ' + h.time + '</div>';
                if (h.error) html += '<div class="history-time" style="color:#ff8888; margin-top:6px;"><i class="fas fa-exclamation-circle"></i> ' + escapeHtml(h.error) + '</div>';
                html += '</div>';
            }
            wadah.innerHTML = html;
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // VERSI CEPAT: jeda 0.8 detik
        async function kirimNGL(username, pesan, total, onProgress, cancel) {
            let sukses = 0;
            for (let i = 1; i <= total; i++) {
                if (cancel && cancel.cancelled) throw new Error('BATAL');
                let terkirim = false;
                let percobaan = 0;
                while (!terkirim && percobaan < 3) {
                    if (cancel && cancel.cancelled) throw new Error('BATAL');
                    try {
                        let body = new URLSearchParams();
                        body.append('username', username);
                        body.append('question', pesan);
                        body.append('deviceId', 'w_' + Date.now() + '_' + i + '_' + Math.random());
                        let res = await fetch('https://ngl.link/api/submit', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: body
                        });
                        if (res.ok) {
                            terkirim = true;
                            sukses++;
                            onProgress(i, total, true);
                        } else {
                            percobaan++;
                            if (percobaan < 3) await new Promise(r => setTimeout(r, 500));
                            else onProgress(i, total, false);
                        }
                    } catch(e) {
                        percobaan++;
                        if (percobaan < 3) await new Promise(r => setTimeout(r, 500));
                        else onProgress(i, total, false);
                    }
                }
                // JEDA LEBIH CEPAT: 0.8 detik (800ms)
                if (i < total) await new Promise(r => setTimeout(r, 800));
            }
            return { sukses: sukses };
        }

        const btnSend = document.getElementById('btnSend');
        const btnCancel = document.getElementById('btnCancel');
        const progressBox = document.getElementById('progressBox');
        const progressFill = document.getElementById('progressFill');
        const percentSpan = document.getElementById('percentText');
        const usernameInp = document.getElementById('username');
        const messageInp = document.getElementById('message');
        const countInp = document.getElementById('count');

        async function prosesKirim() {
            let username = usernameInp.value.trim();
            let pesan = messageInp.value.trim();
            let total = parseInt(countInp.value);

            if (!username) { toast('Isi username NGL!', true); return; }
            if (!pesan) { toast('Isi pesan!', true); return; }
            if (isNaN(total) || total < 1) total = 1;
            if (total > 25) total = 25;
            countInp.value = total;

            btnSend.disabled = true;
            btnSend.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Mengirim...';
            progressBox.classList.remove('hidden');
            progressFill.style.width = '0%';
            percentSpan.innerText = '0%';

            cancelToken = { cancelled: false };
            let suksesCount = 0;

            const onProgress = (cur, tot, ok) => {
                let persen = (cur / tot) * 100;
                progressFill.style.width = persen + '%';
                percentSpan.innerText = Math.floor(persen) + '%';
                if (ok) suksesCount++;
            };

            try {
                let result = await kirimNGL(username, pesan, total, onProgress, cancelToken);
                suksesCount = result.sukses;
                if (suksesCount > 0) {
                    tambahHistory(username, pesan, suksesCount, 'success', null);
                    if (suksesCount === total) toast('Sempurna! ' + total + '/' + total + ' terkirim', false);
                    else toast('Terkirim ' + suksesCount + '/' + total, true);
                } else {
                    tambahHistory(username, pesan, 0, 'failed', 'Gagal semua (username salah/limit)');
                }
            } catch(e) {
                if (e.message === 'BATAL') {
                    toast('Dibatalkan. Terkirim ' + suksesCount + '/' + total, true);
                    if (suksesCount > 0) tambahHistory(username, pesan, suksesCount, 'success', null);
                } else {
                    tambahHistory(username, pesan, suksesCount, 'failed', e.message);
                }
            } finally {
                btnSend.disabled = false;
                btnSend.innerHTML = '<i class="fas fa-paper-plane"></i> Kirim Sekarang';
                progressBox.classList.add('hidden');
                cancelToken = null;
            }
        }

        function batalkanKirim() {
            if (cancelToken) {
                cancelToken.cancelled = true;
                toast('Membatalkan...', true);
            }
        }

        btnSend.onclick = prosesKirim;
        btnCancel.onclick = batalkanKirim;

        const btnHome = document.getElementById('btnHome');
        const btnSpam = document.getElementById('btnSpam');
        const panelHome = document.getElementById('panelHome');
        const panelSpam = document.getElementById('panelSpam');

        btnHome.onclick = function() {
            panelHome.classList.remove('hidden');
            panelSpam.classList.add('hidden');
            btnHome.classList.add('active');
            btnSpam.classList.remove('active');
            renderHistory();
        };

        btnSpam.onclick = function() {
            panelHome.classList.add('hidden');
            panelSpam.classList.remove('hidden');
            btnSpam.classList.add('active');
            btnHome.classList.remove('active');
        };

        const hapusBtn = document.getElementById('hapusHistory');
        hapusBtn.onclick = function() {
            if (confirm('Hapus semua riwayat?')) {
                historyData = [];
                simpanHistory();
                toast('Riwayat dihapus', false);
            }
        };

        renderHistory();
    </script>
</body>
</html>
